kafka:
  brokers:
    - "broker:9092"
  source_topic: "internal.events"
  consumer_group: "broadcaster-client-a"
  dlq_topic: "broadcaster.dlq"

routing:
  header_key: "target-topic"
  # Optional: map one JSON field on the transformed payload to target topics.
  # When enabled, key_path is read after transformation and before enrichment;
  # successful lookup selects targets and the header is ignored for topic choice.
  # content_routing:
  #   enabled: true
  #   key_path: "$.event.type"
  #   value_type: string   # string | bool | int
  #   routes:
  #     "order.created":
  #       - "topic.orders"

transformation:
  rules:
    - from: "$.transaction.id"
      to: "$.txId"
    - from: "$.user.name"
      to: "$.userName"

enrichment:
  - type: "uuid_from_transaction"
    config:
      input_field: "$.txId"
      output_field: "$.eventId"
      algorithm: "sha256"

metrics:
  enabled: true
  port: 9090
  path: "/metrics"
