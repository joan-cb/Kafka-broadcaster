apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kafka-broadcaster.fullname" . }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "kafka-broadcaster.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kafka-broadcaster.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
        checksum/config: {{ .Values.broadcasterConfig | toYaml | sha256sum }}
      labels:
        {{- include "kafka-broadcaster.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: broadcaster
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: CONFIG_PATH
              value: /etc/broadcaster/config.yaml
          volumeMounts:
            - name: config
              mountPath: /etc/broadcaster
              readOnly: true
          ports:
            - name: metrics
              containerPort: {{ .Values.broadcasterConfig.metrics.port | default 9090 }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.broadcasterConfig.metrics.path | default "/metrics" }}
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: {{ .Values.broadcasterConfig.metrics.path | default "/metrics" }}
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: {{ include "kafka-broadcaster.fullname" . }}-config
