# Client-specific values — override per deployment.

# client is used as a label and as part of resource names.
client: ""

# namespace to deploy into (typically a sub-namespace per client).
namespace: ""

replicaCount: 1

image:
  repository: gcr.io/globalcommerce/kafka-broadcaster
  pullPolicy: IfNotPresent
  tag: "latest"

# broadcasterConfig is the full YAML config mounted at /etc/broadcaster/config.yaml.
# Override this in a client-specific values file.
broadcasterConfig:
  kafka:
    brokers: []
    source_topic: ""
    consumer_group: ""
    dlq_topic: ""
  routing:
    header_key: "target-topic"
  transformation:
    rules: []
  enrichment: []
  metrics:
    enabled: true
    port: 9090
    path: "/metrics"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

metrics:
  # Expose a ServiceMonitor for Prometheus Operator scraping.
  serviceMonitor:
    enabled: false
    interval: "30s"
    path: "/metrics"
    port: 9090

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"
